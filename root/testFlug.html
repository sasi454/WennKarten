<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Du schaffst das</title>
  <style>
    :root{
      --bg1:#0b1320;
      --bg2:#1c2541;
      --card-bg:rgba(255,255,255,.06);
      --card-border:rgba(255,255,255,.12);
      --text:#f9fafb;
      --muted:#e5e7eb;
      --accent:#38bdf8;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px 14px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
    }

    .wrap{
      width:min(680px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: 0 14px 44px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 10px;
      font-size:1.45rem;
    }

    .typing{
      font-size:1.08rem;
      line-height:1.55;
      min-height: 5.4em;
      white-space: pre-wrap;
      color:var(--muted);
    }

    .cursor{
      display:inline-block;
      width:10px;
      margin-left:3px;
      background:#fff;
      height:1.1em;
      transform: translateY(2px);
      animation: blink .9s infinite;
    }

    .cursor.hidden{
      opacity:0;
      animation:none;
    }

    @keyframes blink{
      50% { opacity:0; }
    }

    .actions{
      margin-top:14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:0;
      border-radius:14px;
      padding:10px 14px;
      background: rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
      font: inherit;
      font-size:0.95rem;
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition: background .15s ease, transform .08s ease, box-shadow .15s ease;
    }

    button:hover{
      background: rgba(255,255,255,.2);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,.4);
    }

    button:active{
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }

    button:focus-visible{
      outline:2px solid var(--accent);
      outline-offset:3px;
    }

    @media (max-width:480px){
      .wrap{
        padding:20px 14px;
      }
      h1{
        font-size:1.3rem;
      }
      .typing{
        font-size:1rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Wenn du Motivation brauchst…</h1>
    <div class="typing">
      <span id="text"></span><span id="cursor" class="cursor"></span>
    </div>
    <div class="actions">
      <button id="restart">Nochmal abspielen</button>
    </div>
  </div>

  <script>
    const lines = [
      "  Hey du ❤️",
      "Es gibt schwere Tage, an denen alles grau ist,",
      "an denen sich alles schwer und anstrengend anfühlt.",
      "",
      "Genau dann musst du dich an die kleinsten schönen Momente halten.",
      "An einen Schmetterling, der vorbeifliegt.",
      "An einen Sonnenstrahl im Gesicht.",
      "An eine hübsche Blume am Weg.",
      "Diese kleinen Dinge sind Erinnerungen daran,",
      "dass es immer noch Licht gibt – und dass du da durchkommst. 🫶",
      "",
      "Du bist ein Kämpfer.",
      "Du schaffst alles, was du dir vornimmst – das weiß ich.",
      ""
    ];

    const SPEED = 42;      // ms pro Zeichen
    const PAUSE_END = 400; // kleine Pause am Ende

    const target = document.getElementById("text");
    const cursor = document.getElementById("cursor");
    const fullText = lines.join("\n");

    let idx = 0;
    let typingTimeout = null;
    let isTyping = false;

    function clearTypingTimeout(){
      if (typingTimeout){
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
    }

    function startTyping(){
      clearTypingTimeout();
      isTyping = true;
      idx = 0;
      target.textContent = "";
      cursor.classList.remove("hidden");
      step();
    }

    function step(){
      target.textContent = fullText.slice(0, idx++);
      if (idx <= fullText.length){
        typingTimeout = setTimeout(step, SPEED);
      } else {
        isTyping = false;
        setTimeout(() => cursor.classList.add("hidden"), PAUSE_END);
      }
    }

    document.getElementById("restart").addEventListener("click", () => {
      startTyping();
    });

    // automatisch beim Laden starten
    startTyping();
  </script>
</body>
</html>
