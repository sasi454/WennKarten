<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Was brauchst du gerade?</title>
  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:16px;
      background: radial-gradient(circle at 30% 20%, #2a2a72, #0b0b12 70%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
    }

    .card{
      width:min(720px, 100%);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:18px 16px 20px;
      box-shadow: 0 14px 44px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:1.5rem;
    }

    .tag{
      opacity:.8;
      font-size:.95rem;
    }

    .grid{
      display:grid;
      gap:10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top:14px;
    }

    button{
      border:0;
      border-radius:18px;
      padding:14px 12px;
      background: rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
      text-align:left;
      font: inherit;
      line-height:1.3;
      display:flex;
      align-items:flex-start;
      gap:8px;
      transition:background .15s ease, transform .08s ease;
    }

    button span.icon{
      font-size:1.4rem;
    }

    button span.label{
      flex:1;
      font-size:.98rem;
    }

    button:hover{
      background: rgba(255,255,255,.18);
      transform:translateY(-1px);
    }

    button:active{
      transform:translateY(0);
      background: rgba(255,255,255,.24);
    }

    .out{
      margin-top:16px;
      line-height:1.55;
      padding:12px 12px 14px;
      border-radius:16px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.12);
      min-height: 4.5em;
      font-size:1rem;
    }

    @media (max-width:480px){
      .card{
        border-radius:18px;
        padding:16px 12px 18px;
      }
      h1{
        font-size:1.3rem;
      }
      button{
        padding:12px 10px;
      }
      .out{
        font-size:.97rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Was brauchst du gerade?</h1>
    <div class="tag">Tippe auf eins — ich hab was für dich 💛</div>

    <div class="grid">
      <button type="button" data-k="lachen">
        <span class="icon">😂</span>
        <span class="label">Ich will lachen</span>
      </button>

      <button type="button" data-k="ruhe">
        <span class="icon">🌙</span>
        <span class="label">Ich brauche Ruhe</span>
      </button>

      <button type="button" data-k="mut">
        <span class="icon">🔥</span>
        <span class="label">Ich brauche Mut</span>
      </button>

      <button type="button" data-k="stress">
        <span class="icon">😵</span>
        <span class="label">Ich bin gestresst</span>
      </button>

      <button type="button" data-k="kuss">
        <span class="icon">😘</span>
        <span class="label">Ich will einen Kuss</span>
      </button>

      <button type="button" data-k="heim">
        <span class="icon">🏠</span>
        <span class="label">Ich hab Heimweh</span>
      </button>

      <button type="button" data-k="random">
        <span class="icon">🎲</span>
        <span class="label">Überrasch mich</span>
      </button>
    </div>

    <div class="out" id="out" aria-live="polite">
      Wähle eine Stimmung — ich bin da.
    </div>
  </div>

  <script>
    const out = document.getElementById("out");

    const content = {
      lachen: [
        "Kurzer Witz: Ich wollte dir was Süßes schicken… aber du bist schon weg. 😄",
        "Denk an den Moment, als wir … (hier eure Insider-Sache einsetzen) 😂"
      ],
      ruhe: [
        "Atme 4 Sekunden ein, halte 4, atme 6 aus. Wiederhole 5×. Ich atme in Gedanken mit dir. 🌙",
        "Leg das Handy kurz weg, schließ die Augen und stell dir vor, ich streich dir langsam über den Rücken."
      ],
      mut: [
        "Du kannst das. Du bist stärker, als du dich gerade fühlst. Und ich glaub an dich. 🔥",
        "Such dir 1 kleine Sache aus, die du heute schaffst. Danach kurz innehalten und stolz auf dich sein. Wirklich."
      ],
      stress: [
        "Okay, Stress-Modus: Stopp für einen Moment. 3 tiefe Atemzüge. Bei jedem Ausatmen lässt du ein kleines bisschen Spannung los. Ich bin in Gedanken neben dir. 🤍",
        "Schreib dir kurz 3 Dinge auf: 1️⃣ Was muss jetzt wirklich sein? 2️⃣ Was kann warten? 3️⃣ Was kann vielleicht ganz weg? Danach: einmal strecken, Schultern lockern, weiter in deinem Tempo. 💛"
      ],
      kuss: [
        "*muah* 😘 Noch einer? *muah* 😘 (Ich geb dir den Rest, wenn du wieder da bist.)",
        "Ich heb dir einen Extra-Kuss fürs Wiedersehen auf. Und ich verspreche: Der wird richtig gut. ❤️"
      ],
      heim: [
        "Heimweh heißt nur, dass du irgendwo geliebt wirst. Und genau da warten wir auf dich. 🏠",
        "Wenn du zurück bist, machen wir: ___ (Date-Idee). Deal? Ich freu mich jetzt schon drauf."
      ],
      random: [
        "Überraschung: Du bist mein Lieblingsmensch. Immer.",
        "Ich bin stolz auf dich. (Ja, wirklich. Mehr, als du wahrscheinlich denkst.)"
      ]
    };

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    document.querySelectorAll(".grid button").forEach(btn => {
      btn.addEventListener("click", () => {
        const k = btn.dataset.k;
        const options = content[k];
        if (!options) return;
        out.textContent = pick(options);
      });
    });
  </script>
</body>
</html>
