<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sterne für dich ✨</title>
  <style>
    :root{
      --bg-top:#1d2b64;
      --bg-bottom:#0b1020;
      --box-bg:rgba(0,0,0,.25);
      --box-border:rgba(255,255,255,.12);
      --text:#f9fafb;
      --muted:#cbd5e1;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(circle at 50% 30%, var(--bg-top), var(--bg-bottom) 70%);
      position:relative;
      overflow-x:hidden;
      overflow-y:auto;
    }

    canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .overlay{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:grid;
      place-items:center;
      text-align:center;
      padding:24px 16px;
    }

    .box{
      width:min(560px, 92vw);
      background: var(--box-bg);
      border: 1px solid var(--box-border);
      border-radius: 24px;
      padding: 18px 16px;
      backdrop-filter: blur(8px);
    }

    h1{
      margin:0;
      font-size:1.4rem;
    }

    p{
      margin:.65rem 0 0;
      line-height:1.55;
      color:var(--muted);
    }

    @media (max-width:480px){
      h1{ font-size:1.25rem; }
      .box{ padding:16px 14px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <div class="box">
      <h1>Wenn du nicht schlafen kannst…</h1>
      <p>
        Atme langsam ein… und aus… 🌙<br>
        Irgendwo zwischen all diesen Sternen schicke ich dir gerade Ruhe,
        einen Gedanken und eine ganz leise Umarmung.
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const MAX_DPR = 2;          // begrenzt devicePixelRatio für Performance
    const STAR_DENSITY = 0.00018; // Sterne pro Pixel² (grobe Dichte)

    let w = 0, h = 0, dpr = 1;
    let stars = [];
    let resizeScheduled = false;

    function createStars(count){
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: (Math.random() * 1.2 + 0.2) * dpr,
        alpha: Math.random() * 0.8 + 0.2,
        targetAlpha: Math.random() * 0.8 + 0.2,
        twinkleSpeed: 0.01 + Math.random() * 0.02,
        fallSpeed: (0.05 + Math.random() * 0.25) * dpr
      }));
    }

    function resize(){
      const _dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
      const width = window.innerWidth;
      const height = window.innerHeight;

      dpr = _dpr;
      w = canvas.width  = width  * dpr;
      h = canvas.height = height * dpr;

      // Anzahl Sterne anhand der Fläche bestimmen
      const starCount = Math.round(w * h * STAR_DENSITY);
      createStars(starCount);
    }

    // sanftes Entprellen von Resize
    window.addEventListener("resize", () => {
      if (!resizeScheduled) {
        resizeScheduled = true;
        requestAnimationFrame(() => {
          resize();
          resizeScheduled = false;
        });
      }
    });

    resize();

    function draw(){
      ctx.clearRect(0, 0, w, h);

      for (const st of stars) {
        // Alpha sanft Richtung Zielwert bewegen (Twinkle)
        if (Math.abs(st.alpha - st.targetAlpha) < 0.02) {
          st.targetAlpha = Math.random() * 0.8 + 0.2;
        } else {
          st.alpha += (st.targetAlpha - st.alpha) * st.twinkleSpeed;
        }

        const a = Math.max(0.15, Math.min(1, st.alpha));
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        // sanft nach unten „treiben“ lassen
        st.y += st.fallSpeed;
        if (st.y - st.r > h) {
          st.y = -10 * dpr;
          st.x = Math.random() * w;
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
