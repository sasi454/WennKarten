<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wenn du mich vermisst 🌙</title>

  <style>
    :root{
      --bg-top: #1e293b;
      --bg-bottom: #020617;
      --text: #e5e7eb;
      --muted: #cbd5e1;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin:0;
      min-height:100vh;
      background: radial-gradient(circle at 50% 30%, var(--bg-top), var(--bg-bottom));
      overflow-x:hidden;
      overflow-y:auto;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:16px;
      position:relative;
    }

    .container {
      position:relative;
      z-index:2;
      padding:20px 18px;
      max-width:480px;
    }

    h1 {
      font-size:2rem;
      margin-bottom:10px;
    }

    p {
      color:var(--muted);
      line-height:1.5;
      margin:0 0 8px;
    }

    .hint {
      font-size:0.9rem;
      margin-top:10px;
      opacity:0.7;
    }

    #message {
      margin-top:20px;
      display:none;
      opacity:0;
      transform:translateY(10px);
    }

    .message-visible{
      animation: fadeIn 0.9s ease forwards;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    /* Sterne */
    .star {
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      opacity:0.8;
      animation: twinkle 2s infinite alternate;
      border-radius:50%;
    }

    @keyframes twinkle {
      from {opacity:0.2;}
      to {opacity:1;}
    }

    /* Sternschnuppe */
    .shooting-star {
      position:absolute;
      width:2px;
      height:80px;
      background: linear-gradient(white, transparent);
      opacity:0;
      transform-origin: top left;
      pointer-events:none;
    }

    @keyframes shoot {
      0% {
        opacity:1;
        transform: translate(0,0) rotate(var(--angle));
      }
      100% {
        opacity:0;
        transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
      }
    }

    @media (max-width:480px){
      h1{
        font-size:1.7rem;
      }
      .container{
        padding:18px 12px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Wenn du mich vermisst 🌙</h1>
    <p>Schau kurz in den Himmel…</p>
    <p class="hint">Tipp irgendwo in den Himmel ✨</p>

    <div id="message">
      <p>
        Egal wo du bist… wir schauen gerade in den gleichen Himmel 🌌<br><br>
        Und irgendwo da oben ist ein kleiner Gedanke von mir bei dir 💗
      </p>
    </div>
  </div>

  <script>
    const message = document.getElementById("message");
    let messageShown = false;

    createStars(140);

    // Klick auf den Hintergrund (Body) zeigt Nachricht + Sternschnuppe
    document.body.addEventListener("click", (event) => {
      // Klicks auf Container ignorieren, wenn du willst, dass nur „Himmel“ reagiert:
      // if (event.target.closest(".container")) return;

      if (!messageShown) {
        message.style.display = "block";
        message.classList.add("message-visible");
        messageShown = true;
      }

      spawnShootingStar(event.clientX, event.clientY);
    });

    function createStars(count){
      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * window.innerHeight + "px";
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = (1 + Math.random()*2) + "s";
        document.body.appendChild(star);
      }
    }

    function spawnShootingStar(originX, originY){
      const star = document.createElement("div");
      star.className = "shooting-star";

      // Startposition in der Nähe des Klicks
      const offsetX = (Math.random()*80 - 40);
      const offsetY = (Math.random()*40 - 20);

      star.style.top = (originY + offsetY) + "px";
      star.style.left = (originX + offsetX) + "px";

      // Zufällige Richtung (Winkel) und Länge
      const angle = 40 + Math.random()*20;  // 40–60 Grad
      const distance = 220 + Math.random()*120; // Länge der Flugbahn

      const rad = angle * Math.PI / 180;
      const dx = Math.cos(rad) * distance;
      const dy = Math.sin(rad) * distance;

      star.style.setProperty("--angle", angle + "deg");
      star.style.setProperty("--dx", dx + "px");
      star.style.setProperty("--dy", dy + "px");

      document.body.appendChild(star);

      star.style.animation = "shoot 1.1s ease-out forwards";

      star.addEventListener("animationend", () => {
        star.remove();
      });
    }
  </script>

</body>
</html>
