<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Was brauchst du gerade?</title>
  <style>
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      background: radial-gradient(circle at 30% 20%, #2a2a72, #0b0b12 70%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#fff;
    }
    .card{
      width:min(720px, 92vw);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:18px;
      box-shadow: 0 14px 44px rgba(0,0,0,.35);
    }
    h1{ margin:0 0 10px; font-size:1.4rem; }
    .grid{
      display:grid; gap:10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top:12px;
    }
    button{
      border:0; border-radius:18px;
      padding:14px 12px;
      background: rgba(255,255,255,.12);
      color:#fff; cursor:pointer;
      text-align:left;
    }
    button:hover{ background: rgba(255,255,255,.18); }
    .out{
      margin-top:14px; line-height:1.55;
      padding:12px;
      border-radius:16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      min-height: 4.5em;
    }
    .tag{ opacity:.8; font-size:.95rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Was brauchst du gerade?</h1>
    <div class="tag">Tippe auf eins — ich hab was für dich 💛</div>

    <div class="grid">
      <button data-k="lachen">😂 Ich will lachen</button>
      <button data-k="ruhe">🌙 Ich brauche Ruhe</button>
      <button data-k="mut">🔥 Ich brauche Mut</button>
      <button data-k="kuss">😘 Ich will einen Kuss</button>
      <button data-k="heim">🏠 Ich hab Heimweh</button>
      <button data-k="random">🎲 Überrasch mich</button>
    </div>

    <div class="out" id="out">…</div>
  </div>

  <script>
    const out = document.getElementById("out");
    const content = {
      lachen: [
        "Kurzer Witz: Ich wollte dir was Süßes schicken… aber du bist schon weg. 😄",
        "Denk an den Moment, als wir … (hier eure Insider-Sache einsetzen) 😂",
      ],
      ruhe: [
        "Atme 4 Sekunden ein, halte 4, atme 6 aus. Wiederhole 5x. 🌙",
        "Leg das Handy kurz weg und stell dir vor, ich streich dir über den Rücken.",
      ],
      mut: [
        "Du kannst das. Du bist stärker, als du gerade fühlst. 🔥",
        "1 Sache, die du heute schaffst: ___ (kleines Ziel). Danach: stolz sein!",
      ],
      kuss: [
        "*muah* 😘 Noch einer? *muah* 😘",
        "Ich heb dir einen Extra-Kuss fürs Wiedersehen auf. ❤️"
      ],
      heim: [
        "Heimweh heißt nur, dass du irgendwo geliebt wirst. 🏠",
        "Wenn du zurück bist, machen wir: ___ (Date-Idee). Deal?"
      ],
      random: [
        "Überraschung: Du bist mein Lieblingsmensch. Immer.",
        "Ich bin stolz auf dich. (Ja, wirklich.)"
      ]
    };

    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    document.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const k = btn.dataset.k;
        out.textContent = pick(content[k]);
      });
    });

    out.textContent = "Wähle eine Stimmung — ich bin da.";
  </script>
</body>
</html>
