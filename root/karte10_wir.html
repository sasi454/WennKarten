<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wir 🧡</title>
  <style>

:root{
  --bg:#0f172a;
  --card:#ffffff10;
  --text:#ffffff;
  --muted:#cbd5e1;
  --btn:#ffffff;
  --btnText:#0f172a;
  --radius:22px;
  --shadow: 0 18px 50px rgba(0,0,0,.35);
  --accent:#f472b6;
  --accent2:#60a5fa;
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(1000px 700px at 20% 10%, #26307a 0%, transparent 60%),
    radial-gradient(900px 600px at 90% 30%, #7a2650 0%, transparent 55%),
    var(--bg);
  overflow:hidden;
  padding:18px;
}
main.card{
  width:min(560px, 100%);
  background:var(--card);
  border:1px solid #ffffff1a;
  backdrop-filter: blur(10px);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
  z-index:1;
}
h1{font-size:2rem;margin:0 0 8px;letter-spacing:.2px;}
p{margin:0 0 14px;color:var(--muted);line-height:1.5;font-size:1.05rem;}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  border:1px solid #ffffff22;background:#ffffff10;
  font-size:.92rem;margin-bottom:12px;
}
.dot{width:10px;height:10px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 0 4px rgba(244,114,182,.18);
}
button{
  padding:12px 18px;font-size:16px;margin-top:12px;
  border:none;border-radius:14px;cursor:pointer;
  background:var(--btn);color:var(--btnText);font-weight:900;
  transition:transform .08s ease, filter .2s ease;
}
button:hover{transform:translateY(-1px);filter:brightness(1.05);}
button:active{transform:translateY(0px);}
.hidden{display:none;}
.fade-in{animation:fadeIn .45s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.float-emoji{
  position:fixed;left:50vw;top:60vh;transform:translate(-50%,-50%);
  opacity:.95;pointer-events:none;z-index:9999;
  transition: transform 1.2s ease, opacity 1.2s ease;
  will-change: transform, opacity;
}

:root{--accent:#fb7185;--accent2:#60a5fa;}
.timeline{margin:12px 0 8px;text-align:left;}
.item{display:flex;gap:12px;align-items:flex-start;margin:10px 0;}
.pin{width:12px;height:12px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));margin-top:6px;box-shadow:0 0 0 4px rgba(251,113,133,.15);} 
.text{color:#ffffffdd;}
.box{border:1px solid #ffffff1a;background:#ffffff10;border-radius:18px;padding:14px;text-align:left;color:#ffffffdd;margin-top:10px;}

  </style>
</head>
<body>

  <main class="card">
    <div class="badge"><span class="dot"></span> Öffne mich, wenn du an uns denkst</div>
    <h1>Unser „Wir“ 🧡</h1>
    <p>Manchmal reicht ein Gedanke – und plötzlich fühlt es sich wieder nah an.</p>
    <div class="timeline" aria-hidden="true">
      <div class="item"><div class="pin"></div><div class="text"><strong>Ein Moment</strong><br />der nur uns gehört.</div></div>
      <div class="item"><div class="pin"></div><div class="text"><strong>Ein Lachen</strong><br />das ich nie vergesse.</div></div>
      <div class="item"><div class="pin"></div><div class="text"><strong>Ein Versprechen</strong><br />dass wir wieder zusammen sind.</div></div>
    </div>
    <button id="btn">Erinnerung öffnen</button>
    <div class="box hidden" id="box"></div>
  </main>

  <script>

function sparkles({amount=12, emojis=["💛","💗","💞","✨","🤍"], x=window.innerWidth/2, y=window.innerHeight*0.58}={}){
  for(let i=0;i<amount;i++){
    const s=document.createElement('span');
    s.className='float-emoji';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const size = 14 + Math.random()*16;
    s.style.fontSize = size+'px';
    s.style.left = x+'px';
    s.style.top  = y+'px';
    document.body.appendChild(s);
    requestAnimationFrame(()=>{
      const dx = (Math.random()*180-90);
      const dy = -(90+Math.random()*140);
      s.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      s.style.opacity='0';
    });
    setTimeout(()=>s.remove(), 1300);
  }
}

const memories=[
  'Ich liebe, wie ruhig du wirst, wenn du dich sicher fühlst. 🤍',
  'Ich mag unsere kleinen Insider‑Momente – die niemand sonst versteht. 💛',
  'Du bist mein Zuhause‑Gefühl. Egal wo du bist. 🧡',
  'Ich bin dankbar für dich. Jeden Tag ein bisschen mehr. ✨'
];
const btn=document.getElementById('btn');
const box=document.getElementById('box');
btn.addEventListener('click', ()=>{
  box.classList.remove('hidden');
  box.classList.add('fade-in');
  box.textContent = memories[Math.floor(Math.random()*memories.length)];
  sparkles({amount:14, emojis:['🧡','💛','✨','🤍']});
});

  </script>
</body>
</html>
