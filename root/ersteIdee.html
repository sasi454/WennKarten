<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Für dich ❤️</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    h1 {
      font-size: 2.5em;
    }

    .heart {
      font-size: 50px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Guten Flug ✈️</h1>
  <p>Ich vermisse dich jetzt schon…</p>

  <div class="heart">❤️</div>

  <button onclick="showMessage()">Klick mich</button>

  <p id="hidden" style="display:none; margin-top:20px;">
    Komm gut an und denk an mich 🥺💖
  </p>

  <script>
    function showMessage() {
      document.getElementById("hidden").style.display = "block";
    }
  </script>

</body>
</html>
