<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Was brauchst du gerade?</title>
  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:16px;
      background: radial-gradient(circle at 30% 20%, #2a2a72, #0b0b12 70%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
    }

    .card{
      width:min(720px, 100%);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:18px 16px 20px;
      box-shadow: 0 14px 44px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:1.5rem;
    }

    .tag{
      opacity:.8;
      font-size:.95rem;
    }

    .grid{
      display:grid;
      gap:10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      margin-top:14px;
    }

    button{
      border:0;
      border-radius:18px;
      padding:14px 12px;
      background: rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
      text-align:left;
      font: inherit;
      line-height:1.3;
      display:flex;
      align-items:flex-start;
      gap:8px;
      transition:background .15s ease, transform .08s ease, box-shadow .12s ease;
    }

    button span.icon{
      font-size:1.4rem;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:1.6em;
    }

    button span.label{
      flex:1;
      font-size:.98rem;
    }

    button:hover{
      background: rgba(255,255,255,.18);
      transform:translateY(-1px);
    }

    button:active{
      transform:translateY(0);
      background: rgba(255,255,255,.24);
    }

    .grid button.active{
      box-shadow:0 0 0 1px rgba(248,250,252,.7);
      background: rgba(255,255,255,.22);
    }

    .out{
      margin-top:16px;
      line-height:1.55;
      padding:12px 12px 14px;
      border-radius:16px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.12);
      min-height: 4.5em;
      font-size:1rem;
    }

    /* Würfel-Roll-Animation */
    .dice-roll{
      animation:diceRoll .6s ease;
    }

    @keyframes diceRoll{
      0%{ transform:rotate(0deg) scale(1); }
      40%{ transform:rotate(200deg) scale(1.2); }
      100%{ transform:rotate(360deg) scale(1); }
    }

    @media (max-width:480px){
      .card{
        border-radius:18px;
        padding:16px 12px 18px;
      }
      h1{
        font-size:1.3rem;
      }
      button{
        padding:12px 10px;
      }
      .out{
        font-size:.97rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Was brauchst du gerade?</h1>
    <div class="tag">Tippe auf eins — ich hab was für dich 💛</div>

    <div class="grid">
      <button type="button" data-k="stress">
        <span class="icon">😵</span>
        <span class="label">Ich bin gestresst</span>
      </button>

      <button type="button" data-k="naehe">
        <span class="icon">🤗</span>
        <span class="label">Ich brauche Nähe</span>
      </button>

      <button type="button" data-k="auftrag">
        <span class="icon">📝</span>
        <span class="label">Kleiner Auftrag</span>
      </button>

      <button type="button" data-k="random">
        <span class="icon dice-icon">🎲</span>
        <span class="label">Überrasch mich</span>
      </button>
    </div>

    <div class="out" id="out" aria-live="polite">
      Wähle eine Stimmung — ich bin da.
    </div>
  </div>

  <script>
    const out = document.getElementById("out");

    const content = {
      stress: [
        "Okay, Stress-Modus: Stopp für einen Moment. 3 tiefe Atemzüge. Bei jedem Ausatmen lässt du ein bisschen Spannung los. Ich bin in Gedanken neben dir. 🤍",
        "Schreib dir kurz 3 Dinge auf:"
          "1. Was muss jetzt wirklich sein? "
          "2. Was kann warten? "
          "3. Was kann vielleicht ganz weg? "
        "Danach: einmal strecken, Schultern lockern, weiter in deinem Tempo. 💛"
      ],
      naehe: [
        "Stell dir vor, wir liegen zusammen auf dem Sofa. Decke, am kuschekn, Aster irgendwo dazwischen. Ich lehne meinen Kopf an deine Schulter und atme mit dir. 🤍",
        "Leg das Handy kurz weg, schließ die Augen und stell dir vor, ich streich dir langsam über den Rücken.",
        "Augen zu: Du kommst nach Hause, ich umarm dich so lange, bis du merkst, wie dein Körper langsam loslässt. Ich bin hier, auch wenn du gerade weit weg bist. 🤗"
      ],
      auftrag: [
        "Kleiner Auftrag: Such dir in deiner Nähe eine Sache, die schön ist (Himmel, Haus, Baum, irgendwas) und schick mir später ein Foto davon. Ich will durch deine Augen bei dir sein.💛",
        "Schreib mir heute eine Nachricht mit etwas, das gut oder sogar schön war. Nur einen Satz. Den Rest holen wir nach, wenn du wieder da bist. ✨"
      ],
      random: [
        "Überraschung: Du bist mein Lieblingsmensch. Immer.",
        "Ich bin stolz auf dich. (Ja, wirklich. Mehr, als du denkst.)",
        "Wenn du zurück bist, gehen wir in die Therme. Deal? Ich freu mich jetzt schon drauf. 💛",
        "Atme 4 Sekunden ein, halte 4, atme 6 aus. Wiederhole 5×. Ich atme in Gedanken mit dir. 🌙"
      ]
    };

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    const buttons = document.querySelectorAll(".grid button");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const k = btn.dataset.k;
        const options = content[k];
        if (!options) return;

        // aktiven Button hervorheben
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        // Würfel-Animation nur bei "random"
        if (k === "random") {
          const icon = btn.querySelector(".dice-icon");
          if (icon) {
            icon.classList.remove("dice-roll");
            void icon.offsetWidth; // Reflow
            icon.classList.add("dice-roll");
          }
        }

        out.textContent = pick(options);
      });
    });
  </script>
</body>
</html>
