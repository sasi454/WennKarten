<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Angekommen 🌍</title>

  <style>
    :root{
      --bg:#0f172a;
      --card:#ffffff10;
      --text:#ffffff;
      --muted:#cbd5e1;
      --accent:#f472b6;      /* romantisches pink */
      --accent2:#60a5fa;     /* weich-blau */
      --btn:#ffffff;
      --btnText:#0f172a;
      --radius:22px;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 700px at 20% 10%, #1f3a8a 0%, transparent 60%),
        radial-gradient(900px 600px at 90% 30%, #7a2650 0%, transparent 55%),
        var(--bg);
      color: var(--text);
      overflow:hidden;
      padding: 18px;
    }

    .card{
      width:min(560px, 100%);
      background: var(--card);
      border: 1px solid #ffffff1a;
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-size: 2rem;
      margin: 0 0 8px;
      letter-spacing: .2px;
    }

    p{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid #ffffff22;
      background:#ffffff10;
      font-size:.92rem;
      margin-bottom:12px;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 4px rgba(244,114,182,.18);
    }

    /* --- Bildbereich (optional) --- */
    .photo{
      width:100%;
      height: 180px;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid #ffffff1a;
      margin: 10px 0 12px;
      background:
        radial-gradient(160px 120px at 25% 35%, #ffffff14 0%, transparent 60%),
        radial-gradient(220px 160px at 75% 65%, #ffffff12 0%, transparent 65%),
        linear-gradient(135deg, #0b1228, #0b1b3b);
      position:relative;
    }
    .photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:.92;
    }
    .photo .hint{
      position:absolute;
      inset:auto 12px 12px 12px;
      font-size:.9rem;
      color:#ffffffcc;
      background:#00000030;
      border:1px solid #ffffff22;
      border-radius: 14px;
      padding:8px 10px;
      backdrop-filter: blur(6px);
      text-align:left;
    }

    /* --- Koffer Drop (Option A) --- */
    .luggage-stage{
      width: 100%;
      height: 140px;
      margin: 0 0 6px;
      border-radius: 18px;
      position: relative;
      overflow:hidden;
      border: 1px solid #ffffff1a;
      background:
        radial-gradient(160px 120px at 20% 30%, #ffffff10 0%, transparent 60%),
        radial-gradient(220px 160px at 80% 70%, #ffffff10 0%, transparent 65%),
        linear-gradient(135deg, #0b1228, #0b1b3b);
    }

    /* Bodenlinie */
    .luggage-stage::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:18px;
      height:2px;
      background: linear-gradient(90deg, transparent, #ffffff22, transparent);
    }

    .plane{
      position:absolute;
      top: 18px;
      left:-120px;
      font-size: 30px;
      opacity:.95;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
      pointer-events:none;
      /* Kurve fliegen */
      offset-path: path("M -120 80 C 120 10, 240 120, 360 70 S 620 40, 860 80");
      offset-distance: 0%;
      offset-rotate: auto 18deg;
      animation: flyCurve 7.8s linear infinite;
    }
    @keyframes flyCurve{
      from { offset-distance: 0%; }
      to   { offset-distance: 100%; }
    }

    /* Fallback falls offset-path nicht unterstützt */
    @supports not (offset-path: path("M 0 0 L 1 1")){
      .plane{
        top: 18px; left:-140px;
        offset-path:none;
        offset-rotate:0deg;
        animation: flyFallback 8s linear infinite;
      }
      @keyframes flyFallback{
        0%{ transform: translateX(-140px) translateY(0) rotate(8deg); }
        50%{ transform: translateX(50vw) translateY(10px) rotate(10deg); }
        100%{ transform: translateX(calc(100vw + 260px)) translateY(0) rotate(9deg); }
      }
    }

    .suitcase{
      position:absolute;
      left:50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(-110px) scale(.9);
      font-size: 44px;
      opacity:0;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,.35));
      pointer-events:none;
    }

    .suitcase.drop{
      animation: dropSuitcase 1.05s cubic-bezier(.2,.9,.2,1.05) both;
    }

    @keyframes dropSuitcase{
      0%   { transform: translateX(-50%) translateY(-120px) scale(.9); opacity:0; }
      70%  { transform: translateX(-50%) translateY(0px) scale(1.05); opacity:1; }
      85%  { transform: translateX(-50%) translateY(-10px) scale(1.0); }
      100% { transform: translateX(-50%) translateY(0px) scale(1.0); opacity:1; }
    }

    /* Button */
    button{
      padding: 12px 18px;
      font-size: 16px;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: var(--btn);
      color: var(--btnText);
      font-weight: 900;
      transition: transform .08s ease, filter .2s ease;
    }
    button:hover{ transform: translateY(-1px); filter: brightness(1.05); }
    button:active{ transform: translateY(0px); }

    /* Hidden Message */
    #hidden{
      display:none;
      margin-top: 14px;
      font-size: 1.06rem;
      color: #fff;
      animation: fadeIn .45s ease forwards;
    }
    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(6px); }
      to{ opacity:1; transform: translateY(0); }
    }

    /* Konfetti */
    .confetti{
      position: fixed;
      width: 10px;
      height: 14px;
      border-radius: 4px;
      opacity: .95;
      pointer-events:none;
      z-index: 9999;
      will-change: transform, opacity;
    }

    /* kleine Herzen, die sanft aufsteigen */
    .float-heart{
      position:fixed;
      font-size: 18px;
      opacity:.85;
      pointer-events:none;
      z-index: 9999;
      will-change: transform, opacity;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge"><span class="dot"></span> Du bist da.</div>

    <h1>Angekommen 🌍</h1>
    <p>
      Ich hoffe, du bist gut gelandet. Ich stell mir gerade vor, wie du da stehst –
      mit deinem Gepäck, ein bisschen müde… und trotzdem: <strong>du hast’s geschafft.</strong>
    </p>

    <!-- Option A: Koffer landet + kleine Deko -->
    <div class="luggage-stage" aria-hidden="true">
      <div class="plane">✈️</div>
      <div class="suitcase" id="suitcase">🧳</div>
    </div>

    <button id="btn">Ich bin angekommen 💗</button>

    <p id="hidden">
      🫶<br />
      Ich bin so froh, dass du sicher da bist. Und ich bin in Gedanken ganz nah bei dir.
      <br /><br />
      <strong>Ich hab dich lieb.</strong> 🤍
    </p>
  </main>

  <script>
    const btn = document.getElementById("btn");
    const hidden = document.getElementById("hidden");
    const suitcase = document.getElementById("suitcase");

    btn.addEventListener("click", () => {
      hidden.style.display = "block";

      // Koffer-Animation neu starten
      suitcase.classList.remove("drop");
      void suitcase.offsetWidth;
      suitcase.classList.add("drop");

      // Konfetti + Herzen
      confettiBurst();
      heartsRise();
    });

    function confettiBurst(){
      const colors = ["#f472b6", "#60a5fa", "#fbbf24", "#a78bfa", "#22c55e", "#ffffff"];
      const amount = 26;

      for(let i=0;i<amount;i++){
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.background = colors[Math.floor(Math.random()*colors.length)];

        const startX = window.innerWidth * 0.5 + (Math.random()*140 - 70);
        const startY = window.innerHeight * 0.58 + (Math.random()*60 - 30);
        c.style.left = startX + "px";
        c.style.top  = startY + "px";

        const w = 6 + Math.random()*8;
        const h = 10 + Math.random()*10;
        c.style.width = w + "px";
        c.style.height = h + "px";

        document.body.appendChild(c);

        const dx = (Math.random()*520 - 260);
        const dy = -(160 + Math.random()*260);
        const rot = (Math.random()*720 - 360);

        c.animate([
          { transform: "translate(0,0) rotate(0deg)", opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }
        ], {
          duration: 1200 + Math.random()*550,
          easing: "cubic-bezier(.2,.8,.2,1)"
        });

        setTimeout(() => c.remove(), 1850);
      }
    }

    function heartsRise(){
      const emojis = ["💗","💛","💞","✨","🤍"]; 
      for(let i=0;i<10;i++){
        const h = document.createElement("div");
        h.className = "float-heart";
        h.textContent = emojis[Math.floor(Math.random()*emojis.length)];

        const x = window.innerWidth * 0.5 + (Math.random()*220 - 110);
        const y = window.innerHeight * 0.72 + (Math.random()*40 - 20);
        h.style.left = x + "px";
        h.style.top  = y + "px";
        h.style.fontSize = (14 + Math.random()*18) + "px";

        document.body.appendChild(h);

        const dx = (Math.random()*160 - 80);
        const dy = -(140 + Math.random()*160);

        h.animate([
          { transform: "translate(0,0)", opacity: .9 },
          { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
        ], {
          duration: 1400 + Math.random()*500,
          easing: "ease-out"
        });

        setTimeout(() => h.remove(), 2000);
      }
    }
  </script>
</body>
</html>
