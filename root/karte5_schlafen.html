<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sterne für dich</title>
  <style>
    body{
      margin:0; height:100vh; overflow:hidden;
      background: radial-gradient(circle at 50% 30%, #1d2b64, #0b1020 70%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#fff;
    }
    .overlay{
      position:absolute; inset:0;
      display:grid; place-items:center;
      pointer-events:none;
      text-align:center;
      padding:24px;
    }
    .box{
      width:min(560px, 92vw);
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 18px 16px;
      backdrop-filter: blur(8px);
    }
    h1{ margin:0; font-size:1.35rem; }
    p{ margin:.65rem 0 0; line-height:1.55; opacity:.92; }
    canvas{ display:block; width:100%; height:100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="box">
      <h1>Wenn du nicht schlafen kannst…</h1>
      <p>Atme langsam ein… und aus… 🌙<br>
      Ich schicke dir gerade Ruhe, Sterne und eine Umarmung.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let w, h, stars;

    function resize(){
      w = canvas.width = window.innerWidth * devicePixelRatio;
      h = canvas.height = window.innerHeight * devicePixelRatio;
      stars = Array.from({length: 180}, () => ({
        x: Math.random()*w,
        y: Math.random()*h,
        r: (Math.random()*1.2 + 0.2) * devicePixelRatio,
        a: Math.random()*0.8 + 0.2,
        s: Math.random()*0.25 + 0.05
      }));
    }
    window.addEventListener("resize", resize);
    resize();

    function draw(){
      ctx.clearRect(0,0,w,h);
      for(const st of stars){
        st.a += (Math.random()-0.5)*0.03;
        st.a = Math.max(0.15, Math.min(1, st.a));
        ctx.globalAlpha = st.a;
        ctx.beginPath();
        ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        st.y += st.s * devicePixelRatio;
        if(st.y > h){ st.y = -10; st.x = Math.random()*w; }
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
