<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Guten Flug ✈️</title>

  <style>
    :root{
      --bg:#0f172a;
      --card:#ffffff10;
      --text:#ffffff;
      --muted:#cbd5e1;
      --btn:#ffffff;
      --btnText:#0f172a;
      --radius:22px;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1000px 700px at 20% 10%, #26307a 0%, transparent 60%),
                  radial-gradient(800px 600px at 90% 30%, #7a2650 0%, transparent 55%),
                  var(--bg);
      color: var(--text);
      overflow:hidden; /* damit die Deko durchfliegen kann */
      padding: 18px;
    }

    .card{
      width:min(560px, 100%);
      background: var(--card);
      border: 1px solid #ffffff1a;
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-size: 2rem;
      margin: 0 0 8px;
      letter-spacing: .2px;
    }

    p{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1.05rem;
    }

    /* Herz */
    .heart{
      font-size: 54px;
      margin: 10px 0 6px;
      animation: beat 1s infinite;
      filter: drop-shadow(0 10px 25px rgba(255,0,90,.22));
    }

    @keyframes beat{
      0%{ transform: scale(1); }
      50%{ transform: scale(1.25); }
      100%{ transform: scale(1); }
    }

    /* Button */
    button{
      padding: 12px 18px;
      font-size: 16px;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: var(--btn);
      color: var(--btnText);
      font-weight: 800;
      transition: transform .08s ease, filter .2s ease;
    }
    button:hover{ transform: translateY(-1px); filter: brightness(1.05); }
    button:active{ transform: translateY(0px); }

    /* versteckte Nachricht */
    #hidden{
      display:none;
      margin-top: 16px;
      font-size: 1.06rem;
      color: #fff;
      animation: fadeIn .45s ease forwards;
    }
    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(6px); }
      to{ opacity:1; transform: translateY(0); }
    }

    /* ===== Natürlichere Flugzeug-Animation =====
       Trick: Wir kombinieren 2 Animationen:
       - flyPath: bewegt das Flugzeug von links nach rechts
       - bob: kleine Wellenbewegung + minimaler Neigungswechsel
    */
    .plane{
      position: absolute;
      top: 40px;
      left: -120px;
      font-size: 34px;
      opacity: .95;
      pointer-events:none;
      transform: translateZ(0);
      animation:
        flyPath 10.5s linear infinite,
        bob 2.8s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }

   
    @keyframes flyPath {
        0%   { left: -140px; top: 60px; }
        50%  { left: 50vw; top: 30px; }      /* leicht nach oben */
        100% { left: calc(100vw + 160px); top: 50px; }
    }


    @keyframes bob{
      0%   { transform: translateY(0) rotate(8deg); }
      25%  { transform: translateY(6px) rotate(10deg); }
      50%  { transform: translateY(0) rotate(7deg); }
      75%  { transform: translateY(-6px) rotate(9deg); }
      100% { transform: translateY(0) rotate(8deg); }
    }

    /* Wolken */
    .cloud{
      position:absolute;
      font-size: 26px;
      opacity: .16;
      pointer-events:none;
      filter: blur(.2px);
      animation: drift 18s linear infinite;
    }
    .cloud.c1{ top: 90px; left:-240px; animation-duration: 22s; }
    .cloud.c2{ top: 150px; left:-380px; font-size: 34px; opacity:.12; animation-duration: 26s; }
    .cloud.c3{ top: 210px; left:-300px; font-size: 22px; opacity:.14; animation-duration: 20s; }

    @keyframes drift{
      from{ transform: translateX(-260px); }
      to{ transform: translateX(calc(100vw + 260px)); }
    }
  </style>
</head>

<body>
  <!-- Deko -->
  <div class="plane" aria-hidden="true">✈️</div>
  <div class="cloud c1" aria-hidden="true">☁️</div>
  <div class="cloud c2" aria-hidden="true">☁️</div>
  <div class="cloud c3" aria-hidden="true">☁️</div>

  <main class="card">
    <h1>Guten Flug ✈️</h1>
    <p>Ich vermisse dich jetzt schon…</p>

    <div class="heart">❤️</div>

    <button onclick="showMessage()">Klick mich</button>

    <p id="hidden">Komm gut an und denk an mich 🥺💖</p>
  </main>

  <script>
    function showMessage() {
      const el = document.getElementById("hidden");
      el.style.display = "block";

      // kleine Herz-Funken beim Klick
      for (let i = 0; i < 10; i++) {
        const s = document.createElement("span");
        s.textContent = ["💛","💗","💞","✨"][Math.floor(Math.random()*4)];
        s.style.position = "fixed";
        s.style.left = (50 + (Math.random()*120 - 60)) + "vw";
        s.style.top  = (55 + (Math.random()*80 - 40)) + "vh";
        s.style.fontSize = (14 + Math.random()*14) + "px";
        s.style.opacity = "0.9";
        s.style.transition = "transform 1.2s ease, opacity 1.2s ease";
        s.style.pointerEvents = "none";
        document.body.appendChild(s);

        requestAnimationFrame(() => {
          s.style.transform = `translate(${(Math.random()*160-80)}px, ${-(80+Math.random()*120)}px)`;
          s.style.opacity = "0";
        });

        setTimeout(() => s.remove(), 1300);
      }
    }
  </script>
</body>
</html>
