<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lachen 😂</title>
  <style>

:root{
  --bg:#0f172a;
  --card:#ffffff10;
  --text:#ffffff;
  --muted:#cbd5e1;
  --btn:#ffffff;
  --btnText:#0f172a;
  --radius:22px;
  --shadow: 0 18px 50px rgba(0,0,0,.35);
  --accent:#f472b6;
  --accent2:#60a5fa;
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(1000px 700px at 20% 10%, #26307a 0%, transparent 60%),
    radial-gradient(900px 600px at 90% 30%, #7a2650 0%, transparent 55%),
    var(--bg);
  overflow:hidden;
  padding:18px;
}
main.card{
  width:min(560px, 100%);
  background:var(--card);
  border:1px solid #ffffff1a;
  backdrop-filter: blur(10px);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
  z-index:1;
}
h1{font-size:2rem;margin:0 0 8px;letter-spacing:.2px;}
p{margin:0 0 14px;color:var(--muted);line-height:1.5;font-size:1.05rem;}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  border:1px solid #ffffff22;background:#ffffff10;
  font-size:.92rem;margin-bottom:12px;
}
.dot{width:10px;height:10px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 0 4px rgba(244,114,182,.18);
}
button{
  padding:12px 18px;font-size:16px;margin-top:12px;
  border:none;border-radius:14px;cursor:pointer;
  background:var(--btn);color:var(--btnText);font-weight:900;
  transition:transform .08s ease, filter .2s ease;
}
button:hover{transform:translateY(-1px);filter:brightness(1.05);}
button:active{transform:translateY(0px);}
.hidden{display:none;}
.fade-in{animation:fadeIn .45s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.float-emoji{
  position:fixed;left:50vw;top:60vh;transform:translate(-50%,-50%);
  opacity:.95;pointer-events:none;z-index:9999;
  transition: transform 1.2s ease, opacity 1.2s ease;
  will-change: transform, opacity;
}

:root{--accent:#fbbf24;--accent2:#60a5fa;}
.emoji{font-size:62px;animation:bounce 1.3s ease-in-out infinite;filter:drop-shadow(0 14px 24px rgba(0,0,0,.35));}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.bubble{position:fixed;font-size:18px;opacity:.18;pointer-events:none;animation:float 10s linear infinite;}
@keyframes float{from{transform:translateY(12vh)}to{transform:translateY(-120vh)}}
.joke{display:none;margin-top:10px;color:#fff;}
.joke.show{display:block;animation:fadeIn .45s ease forwards;}

  </style>
</head>
<body>

  <main class="card">
    <div class="badge"><span class="dot"></span> Öffne mich, wenn du lachen willst</div>
    <h1>Ein kleines Lächeln für dich 😂</h1>
    <p>Nur kurz: Schultern runter. Gesicht weich. Und dann…</p>
    <div class="emoji">😂</div>
    <button id="btn">Mach mich glücklich</button>
    <p id="hidden" class="hidden">Stell dir vor, ich steh neben dir und sag: <strong>„Okay… noch ein bisschen albern sein ist erlaubt.“</strong> 😄</p>
    <div id="joke" class="joke">Mini‑Witz: Warum lächelt der Computer?<br /><strong>Weil er ein gutes „Byte“ hatte.</strong> 🤭</div>
  </main>

  <script>

function sparkles({amount=12, emojis=["💛","💗","💞","✨","🤍"], x=window.innerWidth/2, y=window.innerHeight*0.58}={}){
  for(let i=0;i<amount;i++){
    const s=document.createElement('span');
    s.className='float-emoji';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const size = 14 + Math.random()*16;
    s.style.fontSize = size+'px';
    s.style.left = x+'px';
    s.style.top  = y+'px';
    document.body.appendChild(s);
    requestAnimationFrame(()=>{
      const dx = (Math.random()*180-90);
      const dy = -(90+Math.random()*140);
      s.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      s.style.opacity='0';
    });
    setTimeout(()=>s.remove(), 1300);
  }
}

for(let i=0;i<14;i++){
  const b=document.createElement('div');
  b.className='bubble';
  b.textContent = ['✨','💛','💞','😂'][Math.floor(Math.random()*4)];
  b.style.left = Math.random()*100+'%';
  b.style.top = (60+Math.random()*60)+'%';
  b.style.animationDuration = (8+Math.random()*8)+'s';
  b.style.fontSize = (14+Math.random()*16)+'px';
  document.body.appendChild(b);
}
const btn=document.getElementById('btn');
const hidden=document.getElementById('hidden');
const joke=document.getElementById('joke');
btn.addEventListener('click', ()=>{
  hidden.classList.remove('hidden');
  hidden.classList.add('fade-in');
  joke.classList.add('show');
  sparkles({amount:18, emojis:['😂','✨','💛','💗']});
});

  </script>
</body>
</html>
