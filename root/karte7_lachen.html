<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lachen 😂</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#ffffff10;
      --text:#ffffff;
      --muted:#cbd5e1;
      --btn:#ffffff;
      --btnText:#0f172a;
      --radius:22px;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --accent:#fbbf24;
      --accent2:#60a5fa;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 20% 10%, #26307a 0%, transparent 60%),
        radial-gradient(900px 600px at 90% 30%, #7a2650 0%, transparent 55%),
        var(--bg);
      overflow-x:hidden;
      overflow-y:auto;
      padding:18px 14px 26px;
    }

    main.card{
      width:min(560px, 100%);
      background:var(--card);
      border:1px solid #ffffff1a;
      backdrop-filter: blur(10px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px 20px;
      text-align:center;
      position:relative;
      overflow:hidden;
      z-index:1;
    }

    h1{
      font-size:2rem;
      margin:0 0 8px;
      letter-spacing:.2px;
    }

    p{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.5;
      font-size:1.05rem;
    }

    button{
      padding:12px 18px;
      font-size:16px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:var(--btn);
      color:var(--btnText);
      font-weight:900;
      transition:transform .08s ease, filter .2s ease, box-shadow .1s ease;
      box-shadow:0 10px 26px rgba(15,23,42,.6);
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    button:active{
      transform:translateY(0px);
      box-shadow:0 6px 16px rgba(15,23,42,.7);
    }

    .hidden{display:none;}

    .fade-in{
      animation:fadeIn .45s ease forwards;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(6px);}
      to{opacity:1;transform:translateY(0);}
    }

    .emoji{
      font-size:62px;
      animation:bounce 1.3s ease-in-out infinite;
      filter:drop-shadow(0 14px 24px rgba(0,0,0,.35));
    }

    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .float-emoji{
      position:fixed;
      opacity:.95;
      pointer-events:none;
      z-index:9999;
      transition: transform 1.2s ease, opacity 1.2s ease;
      will-change: transform, opacity;
    }

    .bubble{
      position:fixed;
      font-size:18px;
      opacity:.18;
      pointer-events:none;
      animation:float 10s linear infinite;
      z-index:0;
    }

    @keyframes float{
      from{transform:translateY(12vh);}
      to{transform:translateY(-120vh);}
    }

    .joke{
      display:none;
      margin-top:10px;
      color:#fff;
    }

    .joke.show{
      display:block;
      animation:fadeIn .45s ease forwards;
    }

    .joke-ps{
      margin-top:8px;
      font-size:0.88rem;
      color:#e5e7ebcc;
      opacity:0;
      animation:fadeIn .6s ease forwards .25s;
    }

    @media (max-width:480px){
      main.card{
        padding:20px 16px;
      }
      h1{
        font-size:1.7rem;
      }
      p{
        font-size:1rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ein kleines Lachen für dich 😂</h1>

    <p class="intro">
      Für den Moment, in dem alles ernst ist und du kurz vergessen hast,
      wie sich richtiges Lachen anfühlt.
    </p>
    <p class="intro">
      Atme einmal tief ein, locker die Schultern…  
      und dann stell dir vor, wie wir zusammen über irgendetwas völlig Albernes lachen.
    </p>

    <div class="emoji">😂</div>

    <button id="btn">Bring mich zum Lachen</button>

    <div id="joke" class="joke"></div>
  </main>

  <script>
    function sparkles({
      amount = 12,
      emojis = ["💛","💗","💞","✨","🤍"],
      x,
      y
    } = {}) {
      const startX = x ?? window.innerWidth / 2;
      const startY = y ?? window.innerHeight * 0.58;

      for (let i = 0; i < amount; i++) {
        const s = document.createElement('span');
        s.className = 'float-emoji';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];

        const size = 14 + Math.random() * 16;
        s.style.fontSize = size + 'px';
        s.style.left = startX + 'px';
        s.style.top  = startY + 'px';

        document.body.appendChild(s);

        requestAnimationFrame(() => {
          const dx = (Math.random() * 180 - 90);
          const dy = -(90 + Math.random() * 140);
          s.style.transform = `translate(${dx}px, ${dy}px)`;
          s.style.opacity = '0';
        });

        setTimeout(() => s.remove(), 1400);
      }
    }

    // Hintergrund-Bubbles
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = ['✨','💛','💞','😂'][Math.floor(Math.random()*4)];
      b.style.left = Math.random() * 100 + '%';
      b.style.top = (60 + Math.random() * 60) + '%';
      b.style.animationDuration = (8 + Math.random() * 8) + 's';
      b.style.fontSize = (14 + Math.random() * 16) + 'px';
      document.body.appendChild(b);
    }

    const btn        = document.getElementById('btn');
    const jokeEl     = document.getElementById('joke');
    const introParas = document.querySelectorAll('.intro');

    const jokes = [
      `Du jeden Morgen: „Ich fühl mich so alt.“<br/>
       Ich: „Du bist noch jung – aber wenn du morgens aufstehst, knackt mehr als nur der Boden.“ 😂`,

      `Für wen kauft ein Egoist Obst? <br/>
       <strong> Pfir-sich </strong> 🍑 `,

      `Im Manöver ruft der Ausbilder: „Stellen Sie sich vor, der Feind steht vor Ihnen! Was tun Sie?“<br/>
       Sagt der Rekrut: <strong>„Melden, dass die Übung zu realistisch geworden ist, Herr Ausbilder!“</strong> 😄
       <div class="joke-ps">PS: Ja, ich weiß nicht, ob er gut ist – aber ich fand ihn witzig. 🙈</div>`
    ];

    let jokeIndex = 0;
    let isRunning = false;
    let introHidden = false;

    btn.addEventListener('click', () => {
      if (isRunning) return;
      isRunning = true;

      if (!introHidden) {
        introHidden = true;
        introParas.forEach(p => p.classList.add('hidden'));
      }

      jokeEl.innerHTML = jokes[jokeIndex];
      jokeIndex = (jokeIndex + 1) % jokes.length;
      jokeEl.classList.add('show');

      const rect = btn.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      sparkles({
        amount: 18,
        emojis: ['😂','✨','💛','💗'],
        x: centerX,
        y: centerY
      });

      setTimeout(() => { isRunning = false; }, 800);
    });
  </script>
</body>
</html>
