<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Für dich</title>
  <style>
    :root { --pink:#ff4d6d; --bg:#0b0b12; }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      background: radial-gradient(circle at 50% 30%, #1a1a2e, var(--bg));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#fff;
    }
    .card{
      width:min(520px, 92vw);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:22px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
      text-align:center;
    }
    .heart{
      width:110px; height:110px; margin:18px auto 10px;
      background: var(--pink);
      position:relative;
      transform: rotate(-45deg);
      animation: beat 1.05s infinite;
      filter: drop-shadow(0 0 18px rgba(255,77,109,.45));
    }
    .heart:before, .heart:after{
      content:""; position:absolute; width:110px; height:110px;
      background: var(--pink); border-radius:50%;
    }
    .heart:before{ top:-55px; left:0; }
    .heart:after{ left:55px; top:0; }

    @keyframes beat{
      0%, 100% { transform: rotate(-45deg) scale(1); }
      20% { transform: rotate(-45deg) scale(1.12); }
      40% { transform: rotate(-45deg) scale(0.98); }
      60% { transform: rotate(-45deg) scale(1.10); }
      80% { transform: rotate(-45deg) scale(1.00); }
    }

    h1{ margin:0; font-size:1.4rem; }
    p{ margin:.6rem 0 0; line-height:1.5; opacity:.92; }
    .small{ font-size:.95rem; opacity:.85; margin-top:10px; }
    button{
      margin-top:14px;
      border:0; border-radius:14px;
      padding:10px 14px;
      background: rgba(255,255,255,.12);
      color:#fff; cursor:pointer;
    }
    button:hover{ background: rgba(255,255,255,.18); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wenn du mich vermisst…</h1>
    <div class="heart" aria-label="Herz"></div>
    <p id="msg">Dann stell dir vor, ich drück dich gerade ganz fest. 🤍</p>
    <p class="small">PS: Du bist mein Lieblingsmensch.</p>
    <button id="btn">Noch eine kleine Nachricht</button>
  </div>

  <script>
    const messages = [
      "Dann stell dir vor, ich drück dich gerade ganz fest. 🤍",
      "Du fehlst mir. Aber ich bin stolz auf dich. ✨",
      "Ein Kuss als Reiseproviant: *muah* 😘",
      "Ich zähle die Tage, bis du wieder da bist. 🗓️❤️"
    ];
    let i = 0;
    document.getElementById("btn").addEventListener("click", () => {
      i = (i + 1) % messages.length;
      document.getElementById("msg").textContent = messages[i];
    });
  </script>
</body>
</html>
